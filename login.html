<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexya — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --v:#6C5CE7;--vl:#A29BFE;--dark:#07070F;--dark2:#0C0C1A;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--dark);
  color:#fff;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.bg-mesh{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 55% at 50% 0%,rgba(108,92,231,0.18) 0%,transparent 70%),
             radial-gradient(ellipse 40% 45% at 80% 90%,rgba(108,92,231,0.09) 0%,transparent 60%),
             var(--dark);
  z-index:0;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.035) 1px,transparent 1px);
  background-size:32px 32px;
  z-index:0;
}
/* Floating orbs */
.orb{
  position:fixed;border-radius:50%;filter:blur(80px);z-index:0;opacity:0.4;
  animation:floatOrb 8s ease-in-out infinite;
}
.orb1{width:300px;height:300px;background:rgba(108,92,231,0.25);top:-80px;left:-80px;animation-delay:0s;}
.orb2{width:200px;height:200px;background:rgba(162,155,254,0.15);bottom:-60px;right:-60px;animation-delay:4s;}
@keyframes floatOrb{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}

.login-wrap{
  position:relative;z-index:10;
  width:100%;max-width:420px;padding:24px;
}
.login-card{
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;padding:44px 40px;
  backdrop-filter:blur(24px);
  box-shadow:0 24px 80px rgba(0,0,0,0.4);
}
.login-logo{
  display:flex;align-items:center;gap:10px;
  margin-bottom:32px;text-decoration:none;
}
.logo-name{
  font-family:'Syne',sans-serif;font-weight:800;font-size:22px;
  letter-spacing:-0.02em;color:#fff;
}
.logo-name em{font-style:normal;color:var(--vl);}
.badge-portal{
  background:rgba(108,92,231,0.15);
  border:1px solid rgba(108,92,231,0.25);
  color:var(--vl);font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:20px;letter-spacing:0.04em;
}
h1.login-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:24px;
  margin-bottom:6px;
}
.login-sub{font-size:13px;color:rgba(255,255,255,0.42);margin-bottom:28px;}

.demo-hint{
  background:rgba(108,92,231,0.08);
  border:1px solid rgba(108,92,231,0.18);
  border-radius:10px;padding:12px 16px;margin-bottom:24px;
  font-size:12px;color:rgba(162,155,254,0.9);line-height:1.7;
}
.demo-hint strong{color:#fff;}

.form-group{margin-bottom:18px;}
.form-label{
  display:block;font-size:11px;font-weight:600;
  color:rgba(255,255,255,0.45);text-transform:uppercase;
  letter-spacing:0.07em;margin-bottom:8px;
}
.input-wrap{position:relative;}
.form-input{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:11px;padding:13px 16px;
  font-family:'Inter',sans-serif;font-size:14px;color:#fff;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.form-input::placeholder{color:rgba(255,255,255,0.22);}
.form-input:focus{
  border-color:var(--v);
  box-shadow:0 0 0 3px rgba(108,92,231,0.15);
  background:rgba(108,92,231,0.06);
}
.form-error{
  font-size:12px;color:#FF7675;margin-top:6px;
  display:none;
}
.form-error.show{display:block;}
.form-footer-row{
  display:flex;justify-content:flex-end;margin-top:-6px;margin-bottom:20px;
}
.form-footer-row a{font-size:12px;color:var(--vl);text-decoration:none;}
.form-footer-row a:hover{text-decoration:underline;}
.btn-login{
  width:100%;background:var(--v);color:#fff;border:none;
  border-radius:11px;padding:14px 20px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;
  transition:background 0.2s,transform 0.15s,box-shadow 0.2s;
  box-shadow:0 0 28px rgba(108,92,231,0.4);
  position:relative;overflow:hidden;
}
.btn-login::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
  pointer-events:none;
}
.btn-login:hover{background:var(--vl);transform:translateY(-1px);box-shadow:0 6px 36px rgba(108,92,231,0.55);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-loader{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.login-footer-links{
  text-align:center;margin-top:24px;
  font-size:13px;color:rgba(255,255,255,0.3);
}
.login-footer-links a{color:var(--vl);text-decoration:none;}
.login-footer-links a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:10px;">
        <span class="logo-name">Nex<em>ya</em></span>
      </a>
      <span class="badge-portal">PORTAIL</span>
    </div>

    <h1 class="login-title">Connexion</h1>
    <p class="login-sub">Accédez au portail d'orchestration des agents IA</p>

    <div class="demo-hint">
      Accès démo — Email&nbsp;: <strong>admin@nexya.ai</strong><br>
      Mot de passe&nbsp;: <strong>nexya2024</strong>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <div class="input-wrap">
          <input type="email" id="email" class="form-input" placeholder="vous@nexya.ai" autocomplete="email">
        </div>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <span class="form-error" id="passError"></span>
      </div>

      <div class="form-footer-row">
        <a href="#">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">Se connecter</span>
        <div class="btn-loader" id="btnLoader"></div>
      </button>
    </form>

    <div class="login-footer-links">
      <a href="index.html">← Retour au site</a>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passInput = document.getElementById('password');
const emailError = document.getElementById('emailError');
const passError = document.getElementById('passError');
const loginBtn = document.getElementById('loginBtn');
const btnText = document.getElementById('btnText');
const btnLoader = document.getElementById('btnLoader');

const DEMO = { email: 'admin@nexya.ai', pass: 'nexya2024' };

form.addEventListener('submit', e => {
  e.preventDefault();
  emailError.classList.remove('show');
  passError.classList.remove('show');

  const email = emailInput.value.trim();
  const pass = passInput.value;
  let ok = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailError.textContent = 'Veuillez entrer un email valide';
    emailError.classList.add('show');
    ok = false;
  }
  if (!pass) {
    passError.textContent = 'Veuillez entrer votre mot de passe';
    passError.classList.add('show');
    ok = false;
  }
  if (!ok) return;

  if (email !== DEMO.email || pass !== DEMO.pass) {
    passError.textContent = 'Identifiants incorrects. Utilisez les identifiants démo.';
    passError.classList.add('show');
    return;
  }

  btnText.style.display = 'none';
  btnLoader.style.display = 'block';
  loginBtn.disabled = true;

  setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
});

emailInput.addEventListener('input', () => emailError.classList.remove('show'));
passInput.addEventListener('input', () => passError.classList.remove('show'));
</script>
</body>
</html>
